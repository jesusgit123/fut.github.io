<!DOCTYPE html>
<html lang="es">

<head>
    <title>Golazo Shop - Contacto</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/templatemo.css">
    <link rel="stylesheet" href="assets/css/custom.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;300;400;500;700;900&display=swap">
    <link rel="stylesheet" href="assets/css/fontawesome.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
</head>

<body>
    <!-- Top Nav y Header (idéntico) -->
    <nav class="navbar navbar-expand-lg bg-dark navbar-light d-none d-lg-block">...</nav>
    <nav class="navbar navbar-expand-lg navbar-light shadow">...</nav>
    <div class="modal fade bg-white" id="templatemo_search">...</div>

    <!-- Start Content Page -->
    <div class="container-fluid bg-light py-5">
        <div class="col-md-6 m-auto text-center">
            <h1 class="h1">Contáctanos</h1>
            <p>¿Tienes alguna duda sobre nuestras camisetas, quieres personalizar un producto o simplemente compartir tu pasión por el fútbol? Escríbenos, estamos aquí para ayudarte.</p>
        </div>
    </div>

    <!-- Start Map -->
    <div id="mapid" style="width: 100%; height: 300px;"></div>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        var mymap = L.map('mapid').setView([-34.603722, -58.381592], 13);
        L.tileLayer('https://api.mapbox.com/styles/v1/{id}/tiles/{z}/{x}/{y}?access_token=pk.eyJ1IjoibWFwYm94IiwiYSI6ImNpejY4NXVycTA2emYycXBndHRqcmZ3N3gifQ.rJcFIG214AriISLbB6B5aw', {
            maxZoom: 18, attribution: 'Map data &copy; OpenStreetMap contributors, Imagery © Mapbox',
            id: 'mapbox/streets-v11', tileSize: 512, zoomOffset: -1
        }).addTo(mymap);
        L.marker([-34.603722, -58.381592]).addTo(mymap).bindPopup("<b>Golazo Shop</b><br />Sede Central, Buenos Aires.").openPopup();
        mymap.scrollWheelZoom.disable();
        mymap.touchZoom.disable();
    </script>
    <!-- Ena Map -->

    <!-- Start Contact -->
    <div class="container py-5">
        <div class="row py-5">
            <form class="col-md-9 m-auto" method="post" role="form">
                <div class="row">
                    <div class="form-group col-md-6 mb-3"><label for="inputname">Nombre</label><input type="text" class="form-control mt-1" id="name" name="name" placeholder="Tu nombre"></div>
                    <div class="form-group col-md-6 mb-3"><label for="inputemail">Email</label><input type="email" class="form-control mt-1" id="email" name="email" placeholder="Tu email"></div>
                </div>
                <div class="mb-3"><label for="inputsubject">Asunto</label><input type="text" class="form-control mt-1" id="subject" name="subject" placeholder="Asunto"></div>
                <div class="mb-3"><label for="inputmessage">Mensaje</label><textarea class="form-control mt-1" id="message" name="message" placeholder="Cuéntanos... ¿Qué camiseta buscas?" rows="8"></textarea></div>
                <div class="row"><div class="col text-end mt-2"><button type="submit" class="btn btn-success btn-lg px-3">Enviar Mensaje</button></div></div>
            </form>
        </div>
    </div>
    <!-- End Contact -->

    <!-- Footer (idéntico) -->
    <footer class="bg-dark">...</footer>

    <!-- Scripts -->
    <script src="assets/js/jquery-1.11.0.min.js"></script>
    <script src="assets/js/jquery-migrate-1.2.1.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/templatemo.js"></script>
    <script src="assets/js/custom.js"></script>
</body>
</html>
